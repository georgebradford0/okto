site_name: okto
site_description: >-
  okto — run a fleet of local and remote LLM coding agents from your phone.
  Operator guide for the okto CLI and the lair runtime.
site_url: https://georgebradford0.github.io/okto/
repo_url: https://github.com/georgebradford0/okto
repo_name: georgebradford0/okto
edit_uri: edit/main/userdocs/
copyright: Experimental software — interfaces change frequently between releases.

# Operator-facing documentation. The repo's top-level `docs/` is developer
# reference material and is intentionally NOT part of this site.
docs_dir: userdocs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.action.edit
    - search.suggest
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Install the CLI: install.md
  - Getting started: getting-started.md
  - Managing lair: managing-lair.md
  - Agents: agents.md
  - MCP servers: mcp.md
  - Background tasks: tasks.md
  - Customization: customization.md
  - Push notifications: notifications.md
  - CLI reference: cli-reference.md

# App Store pages (Apple Support URL + Privacy Policy URL). Served at the same
# directory URLs the old Jekyll permalinks used — /support/ and /privacy/ — so
# the links registered in App Store Connect keep working. Kept out of the
# operator nav above; `not_in_nav` suppresses the --strict "not in nav" error.
not_in_nav: |
  /support.md
  /privacy.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/georgebradford0/okto
