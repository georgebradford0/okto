# Non-secret template — shows expected keys without real values.
# Both the lair Deployment and every child pod consume this Secret via
# `envFrom: lair-secrets`, so keys must be valid env-var names
# (UPPER_SNAKE_CASE). lair's `k8s-ops::upsert_secret` mutates this same
# Secret at runtime when the user changes config from the UI.
#
# Create the real Secret with:
#   kubectl create secret generic lair-secrets \
#     --from-literal=ANTHROPIC_API_KEY="<key>" \
#     --from-literal=GH_TOKEN="<token>" \
#     -n octo
apiVersion: v1
kind: Secret
metadata:
  name: lair-secrets
  namespace: octo
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "<ANTHROPIC_API_KEY>"
  GH_TOKEN:          "<GH_TOKEN>"
