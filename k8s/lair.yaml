apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lair-data
  namespace: octo
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lair
  namespace: octo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lair
  template:
    metadata:
      labels:
        app: lair
    spec:
      serviceAccountName: lair
      containers:
        - name: lair
          image: ghcr.io/georgebradford0/lair:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 9000
              name: noise
          envFrom:
            # All secret keys (ANTHROPIC_API_KEY, GH_TOKEN, NOISE_PRIVATE_KEY,
            # MCP_CONFIG_JSON, MODEL, OPENAI_BASE_URL, OPENAI_API_KEY, …) become
            # env vars verbatim. Same shape child pods use, so adding a key here
            # automatically propagates to children. See k8s-ops::upsert_secret.
            - secretRef:
                name: lair-secrets
          env:
            - name: PUBLIC_PORT
              value: "30090"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: lair-data
---
# Internal HTTP access for children messaging lair
apiVersion: v1
kind: Service
metadata:
  name: lair
  namespace: octo
spec:
  selector:
    app: lair
  ports:
    - port: 8000
      targetPort: 8000
      name: http
---
# External Noise tunnel access
apiVersion: v1
kind: Service
metadata:
  name: lair-noise
  namespace: octo
spec:
  type: NodePort
  selector:
    app: lair
  ports:
    - port: 9000
      targetPort: 9000
      nodePort: 30090
      name: noise
