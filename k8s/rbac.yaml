apiVersion: v1
kind: ServiceAccount
metadata:
  name: lair
  namespace: octo
---
# Used by every child agent Deployment. Intentionally has no Role/RoleBinding —
# children should not have any k8s API access. Mirrors `ensure_child_rbac` in
# k8s-ops/src/k8s.rs (the production codepath used by `octo init`).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: child
  namespace: octo
---
# Namespace-scoped role for workload resources
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lair
  namespace: octo
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lair
  namespace: octo
subjects:
  - kind: ServiceAccount
    name: lair
    namespace: octo
roleRef:
  kind: Role
  name: lair
  apiGroup: rbac.authorization.k8s.io
---
# Cluster-scoped role for node management (remote EC2 provisioning)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lair-nodes
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lair-nodes
subjects:
  - kind: ServiceAccount
    name: lair
    namespace: octo
roleRef:
  kind: ClusterRole
  name: lair-nodes
  apiGroup: rbac.authorization.k8s.io
