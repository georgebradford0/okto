services:
  claudulhu:
    build: .
    ports:
      - "${NOISE_PORT:-9000}:${NOISE_PORT:-9000}"
    environment:
      - GIT_URL=${GIT_URL}
      - GH_TOKEN=${GH_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GIT_USER_NAME=${GIT_USER_NAME:-claudulhu}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-claudulhu@localhost}
      - PUBLIC_HOST=${PUBLIC_HOST:-}
      - NOISE_PORT=${NOISE_PORT:-9000}
      - CLAUDULHU_DEV=${CLAUDULHU_DEV:-0}
    volumes:
      - workspace:/workspace
      - claudulhu-data:/root/.claudulhu
      # Uncomment to use SSH key auth instead of GH_TOKEN:
      # - ~/.ssh/id_rsa:/root/.ssh/id_rsa:ro

volumes:
  workspace:
  claudulhu-data:
