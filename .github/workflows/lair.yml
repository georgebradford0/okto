name: lair Image Release

# Multi-arch (linux/amd64,linux/arm64) buildx build + push to
# ghcr.io/${{ github.repository_owner }}/lair. The image tag pair is
# `<version-from-Cargo.toml>` + `latest`. Manual dispatch only — image
# releases are explicit, not tied to every commit.

on:
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: "Optional suffix appended to the version tag (e.g. 'rc1' → 0.9.0-rc1). Leave empty for a plain release."
        required: false
        default: ""

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read lair version
        id: version
        run: |
          VERSION=$(grep '^version' lair/Cargo.toml | head -1 | sed -E 's/version *= *"([^"]+)".*/\1/')
          if [ -z "$VERSION" ]; then
            echo "Could not read version from lair/Cargo.toml" >&2
            exit 1
          fi
          SUFFIX="${{ github.event.inputs.tag_suffix }}"
          if [ -n "$SUFFIX" ]; then
            VERSION="${VERSION}-${SUFFIX}"
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        id: owner
        run: |
          echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build & push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: lair/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/lair:${{ steps.version.outputs.value }}
            ghcr.io/${{ steps.owner.outputs.value }}/lair:latest
          # Cache to GHA's blob store keyed on this workflow + ref; survives
          # across runs so cargo fetch / cargo build / apt layers stay warm.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Summary
        run: |
          echo "## lair image published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Tags:" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`ghcr.io/${{ steps.owner.outputs.value }}/lair:${{ steps.version.outputs.value }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`ghcr.io/${{ steps.owner.outputs.value }}/lair:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Platforms: linux/amd64, linux/arm64" >> "$GITHUB_STEP_SUMMARY"
