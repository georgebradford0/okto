name: Lair Image

on:
  workflow_dispatch:

# Builds the lair multi-arch Docker image (linux/amd64 + linux/arm64) and
# pushes it to ghcr.io/georgebradford0/lair. Tags: <version> (from
# lair/Cargo.toml) and :latest.
#
# The arm64 leg runs under QEMU emulation, which is slow (~30 min for the
# Rust compile stage). The Dockerfile already has cargo-fetch retry logic to
# handle the intermittent SSL errors that QEMU builds hit on crates.io.

jobs:
  build-and-push:
    name: Build & push lair image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version
        id: version
        run: |
          VERSION=$(grep '^version' lair/Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: lair/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/georgebradford0/lair:${{ steps.version.outputs.value }}
            ghcr.io/georgebradford0/lair:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max