name: Android Build

env:
  # Force JS actions still bundled for Node 20 onto Node 24 to silence the
  # deprecation annotations. Node 24 becomes the runner default 2026-06-16.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Deploy track'
        type: choice
        options:
          - closed
          - production
        default: closed

jobs:
  # Gate: the mobile jest suite must pass before any Android build/release runs.
  test:
    name: Mobile tests
    uses: ./.github/workflows/mobile-test.yml

  distribute:
    name: Google Play (${{ inputs.track }})
    runs-on: ubuntu-latest
    needs: test

    defaults:
      run:
        working-directory: mobile

    # Required GitHub Secrets:
    #   ANDROID_KEYSTORE                  — base64: base64 -i okto-upload-key.keystore | pbcopy
    #   ANDROID_KEYSTORE_PASSWORD         — keystore password
    #   ANDROID_KEY_ALIAS                 — key alias
    #   ANDROID_KEY_PASSWORD              — key password
    #   GOOGLE_PLAY_SERVICE_ACCOUNT_JSON  — base64: base64 -i service-account.json | pbcopy

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # npm workspaces: install from the repo root (single root lockfile installs
      # all workspaces, hoisting deps to <root>/node_modules).
      - name: Install JS dependencies
        working-directory: ${{ github.workspace }}
        run: npm ci

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: echo "$ANDROID_KEYSTORE" | base64 --decode > /tmp/okto-upload-key.keystore

      - name: Write gradle.properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          printf '%s\n' \
            'org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m' \
            'android.useAndroidX=true' \
            'reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64' \
            'newArchEnabled=true' \
            'hermesEnabled=true' \
            'edgeToEdgeEnabled=false' \
            "RELEASE_STORE_FILE=/tmp/okto-upload-key.keystore" \
            "RELEASE_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" \
            "RELEASE_KEY_ALIAS=$ANDROID_KEY_ALIAS" \
            "RELEASE_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" \
            > android/gradle.properties

      - name: Decode service account JSON
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: echo "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" | base64 --decode > /tmp/play-service-account.json

      - name: Install Ruby gems
        run: bundle install --jobs 4 --retry 3

      - name: Deploy to Google Play
        env:
          GOOGLE_PLAY_JSON_KEY: /tmp/play-service-account.json
        run: bundle exec fastlane android ${{ inputs.track }}
