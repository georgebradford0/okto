name: iOS Build

on:
  workflow_dispatch:
    inputs:
      testflight:
        description: 'Upload to TestFlight'
        type: boolean
        default: true

jobs:
  # Gate: the mobile jest suite must pass before any iOS build/release runs.
  test:
    name: Mobile tests
    uses: ./.github/workflows/mobile-test.yml

  # Build the app for the simulator, then gate on the Maestro e2e smoke flow
  # (launch → connect → send a message → assert the agent reply) driven against
  # a fully-offline mock lair. `distribute` needs this job, so a failing flow
  # blocks the TestFlight upload.
  build:
    name: Build & e2e (Simulator)
    runs-on: macos-26
    needs: test

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # npm workspaces: install from the repo root (single root lockfile).
      - name: Install JS dependencies
        working-directory: ${{ github.workspace }}
        run: npm ci

      # Rust toolchain + cache — needed to build the mock lair the e2e flow
      # connects to.
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ github.workspace }}

      - name: Install Maestro
        working-directory: ${{ github.workspace }}
        run: |
          export MAESTRO_VERSION=2.6.0
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: mobile/ios/Pods
          key: pods-${{ hashFiles('mobile/ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update

      # Build Release (not Debug): Release embeds the JS bundle into the app, so
      # it runs standalone on the simulator without a Metro packager — a Debug
      # build would launch to a blank/error screen in CI with no dev server.
      # Release also has __DEV__=false, so there's no dev auto-connect and the
      # app shows the manual connect screen the flow drives (same as App Review).
      - name: Build for simulator (no signing)
        run: |
          xcodebuild \
            -workspace ios/okto.xcworkspace \
            -scheme okto \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ios/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      # Compile the lair binary up front so the e2e step (which builds it lazily)
      # fails fast and clearly on a Rust error, and benefits from the cache.
      - name: Pre-build mock lair
        working-directory: ${{ github.workspace }}
        run: cargo build -p lair --bin lair

      # Pick whatever iPhone simulator the runner image actually ships (the exact
      # model/OS varies by Xcode version) rather than hardcoding a name, and
      # expose its UDID to the install + Maestro steps.
      - name: Select & boot simulator
        run: |
          UDID=$(xcrun simctl list devices available -j \
            | jq -r '[.devices[][] | select(.isAvailable and (.name|startswith("iPhone")))][0].udid')
          if [ -z "$UDID" ] || [ "$UDID" = "null" ]; then
            echo "no available iPhone simulator:"; xcrun simctl list devices available; exit 1
          fi
          echo "Using simulator $UDID"
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"
          echo "--- installed runtimes ---"; xcrun simctl list runtimes
          echo "--- chosen device ---"; xcrun simctl list devices available | grep -B1 "$UDID" || true
          xcrun simctl boot "$UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$UDID"

      - name: Install app on simulator
        run: |
          APP=$(find ios/build -name 'okto.app' -type d -path '*-iphonesimulator/*' | head -1)
          [ -n "$APP" ] || APP=$(find ios/build -name 'okto.app' -type d | head -1)
          if [ -z "$APP" ]; then
            echo "okto.app not found; ios/build product tree:"; find ios/build -maxdepth 5 -name '*.app' 2>/dev/null; exit 1
          fi
          echo "Installing $APP"
          xcrun simctl install "$SIM_UDID" "$APP"

      # Start the offline mock lair, wait until it serves on :9000, then drive the
      # Maestro smoke flow against it. lair + maestro share one shell so the
      # background server reliably outlives neither too early nor into later steps.
      - name: Maestro e2e (smoke)
        working-directory: ${{ github.workspace }}
        env:
          # The XCUITest driver is slow to install on a cold simulator in CI;
          # give it generous headroom (ms) and skip the analytics ping.
          MAESTRO_DRIVER_STARTUP_TIMEOUT: "300000"
          MAESTRO_CLI_NO_ANALYTICS: "1"
        run: |
          set -uo pipefail
          cargo test -p okto-tests --test maestro_serve serve -- --ignored --nocapture > /tmp/lair.log 2>&1 &
          LAIR_PID=$!
          echo "Waiting for mock lair to become ready..."
          for _ in $(seq 1 150); do
            grep -q "is READY and serving" /tmp/lair.log && break
            kill -0 "$LAIR_PID" 2>/dev/null || { echo "mock lair exited early:"; cat /tmp/lair.log; exit 1; }
            sleep 2
          done
          grep -q "is READY and serving" /tmp/lair.log || { echo "mock lair not ready in time:"; cat /tmp/lair.log; exit 1; }
          echo "mock lair ready; running Maestro on ${SIM_UDID}..."
          maestro --device "${SIM_UDID}" test mobile/.maestro/smoke.yaml --env HOST=127.0.0.1
          code=$?
          kill "$LAIR_PID" 2>/dev/null || true
          exit $code

      - name: Upload Maestro artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-ios
          path: |
            ~/.maestro/tests
            /tmp/lair.log
          if-no-files-found: ignore

  distribute:
    name: TestFlight
    runs-on: macos-26
    needs: build
    if: ${{ inputs.testflight }}

    defaults:
      run:
        working-directory: mobile

    # Required GitHub Secrets:
    #   DISTRIBUTION_CERTIFICATE_P12       — base64: base64 -i cert.p12 | pbcopy
    #   DISTRIBUTION_CERTIFICATE_PASSWORD  — password for the .p12
    #   PROVISIONING_PROFILE               — base64: base64 -i profile.mobileprovision | pbcopy
    #   APP_STORE_CONNECT_API_KEY_ID        — key ID from App Store Connect → Users & Access → Keys
    #   APP_STORE_CONNECT_API_KEY_ISSUER_ID — issuer ID from the same page
    #   APP_STORE_CONNECT_API_KEY_CONTENT   — base64: base64 -i AuthKey_XXXXX.p8 | pbcopy

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # npm workspaces: install from the repo root (single root lockfile).
      - name: Install JS dependencies
        working-directory: ${{ github.workspace }}
        run: npm ci

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: mobile/ios/Pods
          key: pods-${{ hashFiles('mobile/ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update

      - name: Import signing certificate
        env:
          CERT_P12: ${{ secrets.DISTRIBUTION_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERT_P12" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security set-keychain-settings build.keychain
          security unlock-keychain -p "" build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Install provisioning profile
        env:
          PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          echo "$PROFILE" | base64 --decode > /tmp/profile.mobileprovision
          UUID=$(security cms -D -i /tmp/profile.mobileprovision | plutil -extract UUID raw -)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV

      - name: Install Ruby gems
        run: bundle install --jobs 4 --retry 3

      - name: Set build number
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          echo "$APP_STORE_CONNECT_API_KEY_CONTENT" | base64 --decode > /tmp/api_key.p8
          APP_STORE_CONNECT_API_KEY_PATH="/tmp/api_key.p8" bundle exec fastlane ios bump_build_number

      - name: Archive
        run: |
          xcodebuild archive \
            -workspace ios/okto.xcworkspace \
            -scheme okto \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath ios/build/okto.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID"

      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>Y9M847D6NV</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.okto</key>
              <string>${PROFILE_UUID}</string>
            </dict>
          </dict>
          </plist>
          EOF
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath ios/build/okto.xcarchive \
            -exportPath ios/build/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            | xcpretty

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          echo "$APP_STORE_CONNECT_API_KEY_CONTENT" | base64 --decode > /tmp/api_key.p8
          echo "Key file first line: $(head -1 /tmp/api_key.p8)"
          echo "Key file size: $(wc -c < /tmp/api_key.p8) bytes"
          IPA_PATH=$(find ios/build/ipa -name "*.ipa" | head -1)
          echo "Uploading: $IPA_PATH"
          APP_STORE_CONNECT_API_KEY_PATH="/tmp/api_key.p8" IPA_PATH="$IPA_PATH" bundle exec fastlane ios upload_tf
