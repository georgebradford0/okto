name: iOS Build

on:
  workflow_dispatch:
    inputs:
      testflight:
        description: 'Upload to TestFlight'
        type: boolean
        default: false

jobs:
  build:
    name: Build iOS (Simulator)
    runs-on: macos-15

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: mobile/ios/Pods
          key: pods-${{ hashFiles('mobile/ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update

      - name: Build for simulator (no signing)
        run: |
          xcodebuild \
            -workspace ios/claudulhu.xcworkspace \
            -scheme claudulhu \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath ios/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

  distribute:
    name: TestFlight
    runs-on: macos-15
    needs: build
    if: ${{ inputs.testflight }}

    defaults:
      run:
        working-directory: mobile

    # Required GitHub Secrets:
    #   DISTRIBUTION_CERTIFICATE_P12       — base64: base64 -i cert.p12 | pbcopy
    #   DISTRIBUTION_CERTIFICATE_PASSWORD  — password for the .p12
    #   PROVISIONING_PROFILE               — base64: base64 -i profile.mobileprovision | pbcopy
    #   APP_STORE_CONNECT_API_KEY_ID        — key ID from App Store Connect → Users & Access → Keys
    #   APP_STORE_CONNECT_API_KEY_ISSUER_ID — issuer ID from the same page
    #   APP_STORE_CONNECT_API_KEY_CONTENT   — base64: base64 -i AuthKey_XXXXX.p8 | pbcopy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: mobile/ios/Pods
          key: pods-${{ hashFiles('mobile/ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update

      - name: Import signing certificate
        env:
          CERT_P12: ${{ secrets.DISTRIBUTION_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERT_P12" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security set-keychain-settings build.keychain
          security unlock-keychain -p "" build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Install provisioning profile
        env:
          PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          echo "$PROFILE" | base64 --decode > /tmp/profile.mobileprovision
          UUID=$(security cms -D -i /tmp/profile.mobileprovision | plutil -extract UUID raw -)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV

      - name: Set build number
        run: |
          cd ios
          agvtool new-version -all ${{ github.run_number }}

      - name: Archive
        run: |
          xcodebuild archive \
            -workspace ios/claudulhu.xcworkspace \
            -scheme claudulhu \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath ios/build/claudulhu.xcarchive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE="$PROFILE_UUID"

      - name: Export IPA
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath ios/build/claudulhu.xcarchive \
            -exportPath ios/build/ipa \
            -exportOptionsPlist ios/ExportOptions.plist \
            | xcpretty

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          IPA_PATH=$(find ios/build/ipa -name "*.ipa" | head -1)
          echo "Uploading: $IPA_PATH"
          IPA_PATH="$IPA_PATH" bundle exec fastlane ios testflight
