name: CLI Release

on:
  workflow_dispatch:

# Builds `okto` (the CLI) for both Linux arches and uploads it as the release
# asset pair attached to `cli-v<version>` (read from `cli/Cargo.toml`). The
# lair runtime binary ships separately via `.github/workflows/lair.yml`.

jobs:
  # Gate the release on the workspace e2e suite (CLI + lair, both offline:
  # no docker, no network, in-process mock LLM / mgmt API). `build` needs this,
  # so a failing test blocks the binaries and the release below.
  test:
    name: e2e tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-x86_64-unknown-linux-gnu-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-x86_64-unknown-linux-gnu-cargo-

      - name: Run e2e test suite
        run: cargo test -p okto-tests

  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: okto-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: okto-linux-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version
        id: version
        run: |
          VERSION=$(grep '^version' cli/Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-compilation toolchain (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build okto
        run: cargo build --release -p okto --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/okto ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version
        id: version
        run: |
          VERSION=$(grep '^version' cli/Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Create GitHub release
        run: |
          gh release create "cli-v${{ steps.version.outputs.value }}" \
            --title "okto CLI v${{ steps.version.outputs.value }}" \
            --notes "okto management CLI. Linux x86_64 and aarch64.

          Install both CLI + lair binaries with:

          \`\`\`sh
          curl -fsSL https://raw.githubusercontent.com/georgebradford0/okto/main/scripts/get-cli.sh | sh
          \`\`\`" \
            artifacts/okto-linux-x86_64/okto-linux-x86_64 \
            artifacts/okto-linux-aarch64/okto-linux-aarch64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
