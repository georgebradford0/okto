name: CLI + lair Release

on:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cli_artifact:  octo-linux-x86_64
            lair_artifact: octo-lair-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cli_artifact:  octo-linux-aarch64
            lair_artifact: octo-lair-linux-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version
        id: version
        run: |
          VERSION=$(grep '^version' cli/Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-compilation toolchain (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build octo
        run: cargo build --release -p octo --target ${{ matrix.target }}

      - name: Build octo-lair
        run: cargo build --release -p octo-lair --target ${{ matrix.target }}

      - name: Rename binaries
        run: |
          cp target/${{ matrix.target }}/release/octo      ${{ matrix.cli_artifact }}
          cp target/${{ matrix.target }}/release/octo-lair ${{ matrix.lair_artifact }}

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.cli_artifact }}
          path: ${{ matrix.cli_artifact }}

      - name: Upload lair artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.lair_artifact }}
          path: ${{ matrix.lair_artifact }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version
        id: version
        run: |
          VERSION=$(grep '^version' cli/Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Create GitHub release
        run: |
          gh release create "cli-v${{ steps.version.outputs.value }}" \
            --title "octo v${{ steps.version.outputs.value }}" \
            --notes "octo CLI + lair binary (Linux x86_64, aarch64).

          ## Installation

          \`\`\`sh
          curl -fsSL https://raw.githubusercontent.com/georgebradford0/octo/main/scripts/get-cli.sh | sh
          \`\`\`" \
            artifacts/octo-linux-x86_64/octo-linux-x86_64 \
            artifacts/octo-linux-aarch64/octo-linux-aarch64 \
            artifacts/octo-lair-linux-x86_64/octo-lair-linux-x86_64 \
            artifacts/octo-lair-linux-aarch64/octo-lair-linux-aarch64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
