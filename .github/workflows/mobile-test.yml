name: Mobile Tests

# Reusable gate: runs the mobile jest suite on cheap Ubuntu. Called by the iOS
# and Android workflows so a failing test blocks the build/release jobs before
# any expensive native toolchain spins up.
on:
  workflow_call:

jobs:
  test:
    name: Jest (mobile)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # npm workspaces: install from the repo root (single root lockfile installs
      # all workspaces, hoisting deps to <root>/node_modules).
      - name: Install JS dependencies
        run: npm ci

      - name: Run mobile test suite
        run: npm test -w mobile
