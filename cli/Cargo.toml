[package]
name        = "octo"
version     = "0.0.41"
edition     = "2021"
description = "octo cluster management CLI"

[[bin]]
name = "octo"
path = "src/main.rs"

[dependencies]
octo-k8s-ops = { path = "../k8s-ops" }
anyhow            = "1.0"
clap              = { version = "4", features = ["derive", "env"] }
clap_complete     = "4"
serde             = { version = "1.0", features = ["derive"] }
serde_json        = "1.0"
tokio             = { version = "1", features = ["full"] }
snow              = "0.9"
hex               = "0.4"
data-encoding     = "2"
qrcode            = "0.14"
