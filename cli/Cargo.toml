[package]
name        = "claudulhu"
version     = "0.0.19"
edition     = "2021"
description = "claudulhu cluster management CLI"

[[bin]]
name = "claudulhu"
path = "src/main.rs"

[dependencies]
claudulhu-k8s-ops = { path = "../k8s-ops" }
anyhow            = "1.0"
clap              = { version = "4", features = ["derive", "env"] }
serde             = { version = "1.0", features = ["derive"] }
serde_json        = "1.0"
tokio             = { version = "1", features = ["full"] }
snow              = "0.9"
hex               = "0.4"
data-encoding     = "2"
qrcode            = "0.14"
