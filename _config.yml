title: Okto
description: Privacy policy and project pages for the Okto mobile app.
theme: jekyll-theme-cayman

# Only the privacy policy page carries Jekyll front matter and is rendered as a
# web page. Everything else in this monorepo is source code — exclude the large
# app directories so the published site stays small and fast to build. Source
# files without front matter are copied verbatim (not rendered) by Jekyll, so
# they are harmless, but there is no reason to publish them.
exclude:
  - core/
  - lair/
  - cli/
  - tests/
  - relay/
  - mobile/
  - desktop/
  - target/
  - .github/
  - Cargo.toml
  - Cargo.lock
  - CLAUDE.md
